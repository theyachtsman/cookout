  </g>
  <!-- grill bowl -->
  <path d="M30 140 h140 c0 42 -32 66 -70 66 c-38 0 -70 -24 -70 -66 Z"
        fill="#18181b" stroke="#3f3f46" stroke-width="5"/>
  <path d="M92 168 c-5 7 -5 14 0 20 c5 -6 5 -13 0 -20 Z" fill="#a3e635"/>
  <!-- spatula -->
  <g transform="rotate(-18 38 120)">
    <rect x="30" y="96" width="12" height="52" rx="4" fill="#b45309" stroke="#1a2e05" stroke-width="3"/>
    <rect x="18" y="52" width="36" height="48" rx="8" fill="#52525b" stroke="#18181b" stroke-width="4"/>
    <line x1="28" y1="60" x2="28" y2="92" stroke="#18181b" stroke-width="4"/>
    <line x1="38" y1="60" x2="38" y2="92" stroke="#18181b" stroke-width="4"/>
    <line x1="48" y1="60" x2="48" y2="92" stroke="#18181b" stroke-width="4"/>
  </g>
</svg>
