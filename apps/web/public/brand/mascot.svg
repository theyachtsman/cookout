<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Cookout mascot">
  <!-- green flame -->
  <path d="M100 8 C88 40 60 52 62 88 C63 112 78 128 100 132 C122 128 137 112 138 88 C140 52 112 40 100 8 Z"
        fill="#a3e635" stroke="#1a2e05" stroke-width="5"/>
  <path d="M100 34 C93 52 78 60 80 82 C81 98 90 108 100 110 C110 108 119 98 120 82 C122 60 107 52 100 34 Z"
        fill="#d9f99d" opacity="0.85"/>
  <!-- sunglasses -->
  <g stroke="#18181b" stroke-width="4" fill="#27272a">
    <rect x="64" y="78" width="32" height="20" rx="6"/>
    <rect x="104" y="78" width="32" height="20" rx="6"/>
    <line x1="96" y1="86" x2="104" y2="86"/>
    <line x1="64" y1="84" x2="56" y2="80"/>
    <line x1="136" y1="84" x2="144" y2="80"/>
  </g>
  <!-- coins -->
  <g stroke="#1a2e05" stroke-width="4">
    <circle cx="70" cy="136" r="18" fill="#65a30d"/>
    <circle cx="100" cy="130" r="19" fill="#84cc16"/>
    <circle cx="130" cy="136" r="18" fill="#65a30d"/>
    <path d="M70 128 c-4 5 -4 11 0 16 M100 121 c-4 5 -4 12 0 17 M130 128 c-4 5 -4 11 0 16"
