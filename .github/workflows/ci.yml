name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w @cookout/shared
      - run: npm run test -w @cookout/shared
      - run: npm run test -w @cookout/server
      - run: npm run build -w @cookout/server
      - run: npm run build -w @cookout/web
      - run: npm run test -w @cookout/contracts
