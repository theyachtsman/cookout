services:
  postgres:
    image: postgres:16-alpine
    container_name: cookout-postgres
    environment:
      POSTGRES_USER: cookout
      POSTGRES_PASSWORD: cookout
      POSTGRES_DB: cookout
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - cookout_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookout"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cookout_pgdata:
